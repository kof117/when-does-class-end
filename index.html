<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>when will class be over?</title>
    <style>
        h1,h2,h3,h4,h5,h6,span,input {
            font-family:helvetica;
        }
    </style>
</head>
<body>
    <h1>when will class be over?</h1>
    <h3>input a start time and an end time</h3>
    <input type="time" id="startTime">
    <progress id="progressBar" value="0" max="100"> class end progress </progress>
    <span id="percentageTrack"></span>
    <input type="time" id="endTime">
    <h3 id="timeRemaining">class ends in</h3>
    <button id="typMonThur">monday-thursday schedule</button>
    <br>
    <button id="typFri">friday schedule</button>
    <br>
    <footer>
        <p>an app developed by kof117, free and modifiable for non-commerical use.</p>
        <a href="https://github.com/kof117/when-does-class-end">github page</a>
    </footer>
    <script>
        const startTimeInput = document.getElementById('startTime');
        const endTimeInput = document.getElementById('endTime');
        const progressBar = document.getElementById('progressBar');
        const timeRemainingText = document.getElementById('timeRemaining');
        const percentage = document.getElementById('percentageTrack');
        const monThurBtn = document.getElementById("typMonThur");
        const friBtn = document.getElementById("typFri");
        var d = new Date();
        var hour = d.getHours();
        var minutes = d.getMinutes();
        var seconds = d.getSeconds();
        monThurBtn.addEventListener("click", function() {
            var d = new Date();
            var hour = d.getHours();
            var minutes = d.getMinutes();
            var seconds = d.getSeconds();
             console.log(hour)
             console.log(minutes)
             var time = (hour * 60) + minutes
             if (time >= 480 && time < 545) {
                startTimeInput.value = "08:00"
                endTimeInput.value = "09:05"
             } else if (time >= 550 && time < 615) {
                startTimeInput.value = "09:10"
                endTimeInput.value = "10:15"
             } else if (time >= 620 && time < 690) {
                startTimeInput.value = "10:20"
                endTimeInput.value = "11:30"
             } else if (time >= 690 && time < 745) {
                startTimeInput.value = "11:30"
                endTimeInput.value = "12:25"
             } else if (time >= 750 && time < 815) {
                startTimeInput.value = "12:30"
                endTimeInput.value = "13:35"
             } else if (time >= 820 && time < 885) {
                startTimeInput.value = "13:40"
                endTimeInput.value = "14:45"
             } else {
                alert("it's either passing time, or school isn't in session")
             }
        });
        friBtn.addEventListener("click", function() {
            var d = new Date();
            var hour = d.getHours();
            var minutes = d.getMinutes();
            var seconds = d.getSeconds();
            console.log(hour)
             console.log(minutes)
             var time = (hour * 60) + minutes
             if (time >= 480 && time < 535) {
                startTimeInput.value = "08:00"
                endTimeInput.value = "08:55"
             } else if (time >= 540 && time < 595) {
                startTimeInput.value = "09:00"
                endTimeInput.value = "09:55"
             } else if (time >= 600 && time < 660) {
                startTimeInput.value = "10:00"
                endTimeInput.value = "11:00"
             } else if (time >= 660 && time < 690) {
                startTimeInput.value = "11:00"
                endTimeInput.value = "11:30"
             } else if (time >= 695 && time < 750) {
                startTimeInput.value = "11:35"
                endTimeInput.value = "12:30"
             } else if (time >= 755 && time < 810) {
                startTimeInput.value = "12:35"
                endTimeInput.value = "13:30"
             } else {
                alert("it's either passing time, or school isn't in session")
             }
        });
        function updateProgress() {
            const startTime = new Date();
            const endTime = new Date();

            const [startHours, startMinutes] = startTimeInput.value.split(':').map(Number);
            const [endHours, endMinutes] = endTimeInput.value.split(':').map(Number);

            startTime.setHours(startHours, startMinutes, 0);
            endTime.setHours(endHours, endMinutes, 0);

            const totalDuration = (endTime - startTime) / 1000; // in seconds
            const elapsedDuration = (new Date() - startTime) / 1000; // in seconds

            if (totalDuration > 0) {
                const progressValue = Math.min((elapsedDuration / totalDuration) * 100, 100);
                percentage.textContent = Math.round(progressValue) + "%"
                progressBar.value = progressValue;
                timeRemainingText.textContent = "class ends in " + (Math.round(totalDuration - elapsedDuration)) + " seconds"
            } else {
                progressBar.value = 0;
                percentage.textContent = ""
                timeRemainingText.textContent = "set a valid time"
            }
        }

        setInterval(updateProgress, 1000); // Update every second
    </script>
</body>
</html>
